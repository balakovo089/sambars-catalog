<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Карта раскроя прицепа — редактор</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DejaVu Sans',Arial,sans-serif;background:#f5f5f5;display:flex;height:100vh}
.sidebar{width:340px;background:#fff;padding:16px;overflow-y:auto;box-shadow:2px 0 8px rgba(0,0,0,.1);z-index:2}
.sidebar h2{font-size:15px;color:#2c3e50;margin-bottom:12px}
.sidebar h3{font-size:12px;color:#555;margin:14px 0 6px;border-top:1px solid #eee;padding-top:10px}
label{display:block;font-size:11px;color:#777;margin-bottom:1px}
input,select{width:100%;padding:6px 8px;border:1px solid #ddd;border-radius:4px;font-size:13px;margin-bottom:8px}
input:focus,select:focus{outline:none;border-color:#3498db}
.btn{display:inline-block;padding:6px 14px;border-radius:4px;font-size:12px;cursor:pointer;border:none;margin:2px}
.btn-blue{background:#3498db;color:#fff}
.btn-red{background:#e74c3c;color:#fff}
.btn-gray{background:#eee;color:#555}
.result{background:#f0f4ff;padding:10px;border-radius:6px;margin-top:6px;font-size:11px}
.result table{width:100%;border-collapse:collapse}
.result th{text-align:left;color:#555;font-weight:600;padding:2px 0}
.result td{padding:1px 0}
.result .total{border-top:2px solid #2c3e50;font-weight:bold}
.tip{font-size:10px;color:#aaa;margin-top:4px}
.main{flex:1;overflow:auto;background:#e8ecf0}
canvas{cursor:crosshair;display:block}
.toolbar{position:fixed;bottom:20px;left:360px;background:#fff;padding:8px 12px;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,.15);display:flex;gap:8px;align-items:center;font-size:12px}
.toolbar button{padding:6px 16px;border-radius:4px;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:12px;white-space:nowrap}
.toolbar button.active{background:#3498db;color:#fff;border-color:#3498db}
.toolbar button:hover{opacity:.85}
.toolbar .sep{width:1px;height:20px;background:#ddd}
</style>
</head>
<body>

<div class="sidebar">
  <h2>🔧 Карта раскроя прицепа</h2>

  <label>Модель</label>
  <select id="brand" onchange="redraw()">
    <option value="barsuk">Барсук (60×40×2)</option>
    <option value="sambars">Самбарс (60×60×2)</option>
    <option value="bizon">Бизон (60×60×2)</option>
  </select>
  <label>Длина рамы, мм</label>
  <input type="number" id="L" value="2000" min="1500" max="6000" step="50" onchange="redraw()">
  <label>Ширина рамы, мм</label>
  <select id="W" onchange="redraw()">
    <option value="1250">1250</option><option value="1500" selected>1500</option>
    <option value="1800">1800</option><option value="2000">2000</option>
  </select>
  <label>Высота борта, мм</label>
  <select id="sideH" onchange="redraw()">
    <option value="300" selected>300</option><option value="500">500</option>
  </select>
  <label>Высота тента, мм</label>
  <select id="tentH" onchange="redraw()">
    <option value="0">Без тента</option><option value="500">500</option><option value="1200" selected>1200</option>
  </select>

  <h3>📊 СПЕЦИФИКАЦИЯ</h3>
  <div class="result" id="spec"></div>
  <h3>⚖️ ИТОГО</h3>
  <div class="result" id="total"></div>
  <div class="tip">🖱 На схеме: клик на элемент = удалить<br>Shift+клик = добавить поперечину/стойку<br>🖱 Колёсико = зум</div>
  <div class="tip" style="margin-top:6px">Синий ▬ 60×60×2 | Серый ▬ 40×20×2<br>Красный ▬ 80×40×3 | Голубой ▬ 25×25×2<br>Зелёный - - 20×20×1,5</div>
</div>

<canvas id="c"></canvas>

<div class="toolbar" id="toolbar">
  <b>🛠 Инструмент:</b>
  <button class="active" onclick="setTool('delete')" id="btn-del">🗑 Удалить</button>
  <button onclick="setTool('addCross')" id="btn-cross">➕ Поперечина</button>
  <button onclick="setTool('addVert')" id="btn-vert">➕ Стойка борта</button>
  <button onclick="setTool('addArch')" id="btn-arch">➕ Дуга тента</button>
  <span class="sep"></span>
  <button onclick="resetAll()">🔄 Сброс</button>
  <span class="sep"></span>
  <span style="color:#888;font-size:11px">L={L}мм W={W}мм</span>
</div>

<script>
// ═══ STATE ═══
let tool = 'delete';
let crossPositions = [];  // positions of cross members as fraction of length
let vertPositions = [];   // positions of side posts as fraction of length
let archPositions = [];   // positions of tent arches as fraction of length

function getModel() { return document.getElementById('brand').value; }
function getFrameTube() { return getModel() === 'barsuk' ? TUBES.frame6040 : TUBES.frame60; }
function hasCenterBeam() { return getModel() !== 'barsuk'; }

function setTool(t) {
  tool = t;
  document.querySelectorAll('.toolbar button').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + ({delete:'del',addCross:'cross',addVert:'vert',addArch:'arch'}[t])).classList.add('active');
}

function resetAll() {
  crossPositions = [];
  vertPositions = [];
  archPositions = [];
  redraw();
}

function getParams() {
  return {
    L: parseInt(document.getElementById('L').value),
    W: parseInt(document.getElementById('W').value),
    sideH: parseInt(document.getElementById('sideH').value),
    tentH: parseInt(document.getElementById('tentH').value),
    brand: document.getElementById('brand').value,
  };
}

const TUBES = {
  frame60:  {name:'60×60×2', color:'#2c3e50', massPerM:3.56},
  frame6040: {name:'60×40×2', color:'#34495e', massPerM:2.93},
  cross:    {name:'40×20×1,5', color:'#7f8c8d', massPerM:1.35},
  drawbar:  {name:'80×40×3', color:'#e74c3c', massPerM:5.19},
  side:     {name:'25×25×1,5', color:'#3498db', massPerM:1.08},
  tent:     {name:'20×20×1,5',color:'#27ae60', massPerM:0.84},
};

// ═══ DRAWING ═══
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let scale = 0.3;
let offsetX = 30, offsetY = 30;
let dragging = false;
let dragStartX, dragStartY, dragOffsetX, dragOffsetY;
let zooming = false;

function resizeCanvas() {
  canvas.width = window.innerWidth - 340;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.onresize = resizeCanvas;

// Zoom & pan
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 0.9;
  scale *= factor;
  scale = Math.max(0.15, Math.min(1.0, scale));
  redraw();
});

canvas.addEventListener('mousedown', e => {
  if (e.button === 1 || (e.button === 0 && e.altKey)) {
    dragging = true;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    dragOffsetX = offsetX;
    dragOffsetY = offsetY;
  }
});
canvas.addEventListener('mousemove', e => {
  if (dragging) {
    offsetX = dragOffsetX + (e.clientX - dragStartX);
    offsetY = dragOffsetY + (e.clientY - dragStartY);
    redraw();
  }
});
window.addEventListener('mouseup', () => { dragging = false; });

// Click to add/remove
canvas.addEventListener('click', e => {
  const {L, W, sideH, tentH} = getParams();
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  const ox = offsetX;
  const oy = offsetY + 80;
  const fw = W * scale;
  const fl = L * scale;
  const dbLen = 2000 * (L / 2570) * scale;
  const sideOX = ox + fw + 50;

  if (tool === 'delete') {
    // Check cross members
    for (let i = crossPositions.length-1; i >= 0; i--) {
      const y = oy + fl * crossPositions[i];
      const dist = Math.abs(my - y);
      if (mx > ox && mx < ox + fw && dist < 15) {
        crossPositions.splice(i, 1);
        redraw(); return;
      }
    }
    // Check side posts
    for (let i = vertPositions.length-1; i >= 0; i--) {
      const x = sideOX + fl * vertPositions[i];
      const dist = Math.abs(mx - x);
      if (my > oy && my < oy + sideH*scale && dist < 15) {
        vertPositions.splice(i, 1);
        redraw(); return;
      }
    }
    // Check tent arches
    for (let i = archPositions.length-1; i >= 0; i--) {
      const x = sideOX + fl * archPositions[i];
      const th = tentH * scale;
      const ty = oy - th - 10;
      const dist = Math.abs(mx - x);
      if (my > ty && my < ty + th && dist < 15) {
        archPositions.splice(i, 1);
        redraw(); return;
      }
    }
  } else if (tool === 'addCross') {
    // Add cross member where clicked
    if (mx > ox && mx < ox + fw && my > oy && my < oy + fl) {
      const frac = (my - oy) / fl;
      // Don't add too close to existing
      const tooClose = crossPositions.some(p => Math.abs(p - frac) < 0.05);
      if (!tooClose) {
        crossPositions.push(frac);
        crossPositions.sort((a,b)=>a-b);
        redraw();
      }
    }
  } else if (tool === 'addVert') {
    if (mx > sideOX && mx < sideOX + fl && my > oy && my < oy + sideH*scale) {
      const frac = (mx - sideOX) / fl;
      const tooClose = vertPositions.some(p => Math.abs(p - frac) < 0.05);
      if (!tooClose) {
        vertPositions.push(frac);
        vertPositions.sort((a,b)=>a-b);
        redraw();
      }
    }
  } else if (tool === 'addArch') {
    const th = tentH * scale;
    const ty = oy - th - 10;
    if (mx > sideOX && mx < sideOX + fl && my > ty && my < ty + th) {
      const frac = (mx - sideOX) / fl;
      const tooClose = archPositions.some(p => Math.abs(p - frac) < 0.05);
      if (!tooClose) {
        archPositions.push(frac);
        archPositions.sort((a,b)=>a-b);
        redraw();
      }
    }
  }
});

function drawFrame(L, W) {
  const ox = offsetX;
  const oy = offsetY + 80;
  const fw = W * scale;
  const fl = L * scale;

  // Frame outer
  const frameTube = getFrameTube();
  ctx.strokeStyle = frameTube.color;
  ctx.lineWidth = 8;
  ctx.strokeRect(ox, oy, fw, fl);

  // Center beam (only Sambars/Bizon)
  if (hasCenterBeam()) {
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(ox + fw/2, oy);
    ctx.lineTo(ox + fw/2, oy + fl);
    ctx.stroke();
  }

  // Cross members
  ctx.strokeStyle = TUBES.cross.color;
  ctx.lineWidth = 5;
  const totalCross = [...crossPositions];
  // Add end cross members if none at 0 and 1
  if (!totalCross.some(p => p < 0.05)) totalCross.unshift(0.05);
  if (!totalCross.some(p => p > 0.95)) totalCross.push(0.95);
  totalCross.forEach(frac => {
    const y = oy + fl * frac;
    ctx.beginPath();
    ctx.moveTo(ox, y);
    ctx.lineTo(ox + fw, y);
    ctx.stroke();
  });

  // Corner gussets
  ctx.strokeStyle = '#c0392b';
  ctx.lineWidth = 1.5;
  const cs = 30;
  [[ox,oy,1,1],[ox+fw,oy,-1,1],[ox,oy+fl,1,-1],[ox+fw,oy+fl,-1,-1]].forEach(([cx,cy,sx,sy])=>{
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+sx*cs,cy+sy*cs); ctx.stroke();
  });

  // Drawbar
  const dbLen = 2000 * (L / 2570);
  const dbBase = W * 0.9;
  const dbx = ox + (fw - dbBase*scale)/2;
  const dby = oy + fl;
  const apexX = ox + fw/2;
  const apexY = dby + dbLen * scale;

  ctx.strokeStyle = TUBES.drawbar.color;
  ctx.lineWidth = 7;
  ctx.beginPath(); ctx.moveTo(dbx, dby); ctx.lineTo(apexX, apexY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(dbx + dbBase*scale, dby); ctx.lineTo(apexX, apexY); ctx.stroke();
  ctx.lineWidth = 5;
  ctx.beginPath(); ctx.moveTo(dbx, dby + 150*scale); ctx.lineTo(dbx + dbBase*scale, dby + 150*scale); ctx.stroke();
  ctx.fillStyle = '#e74c3c';
  ctx.beginPath(); ctx.arc(apexX, apexY, 10, 0, Math.PI*2); ctx.fill();

  return {
    ox, oy, fw, fl,
    dbLen, dbBase, apexX, apexY, dbx, dby,
    totalCross: totalCross,
  };
}

function drawSides(L, W, sideH, frameData) {
  const {ox, oy, fw, fl} = frameData;
  const sx = ox + fw + 50;
  const sh = sideH * scale;

  ctx.strokeStyle = TUBES.side.color;
  ctx.lineWidth = 3;
  ctx.strokeRect(sx, oy, fl, sh);

  // Horizontal rails
  const nH = sideH >= 500 ? 2 : 1;
  ctx.lineWidth = 2;
  for (let i = 1; i <= nH; i++) {
    const hy = oy + (sh * i) / (nH + 1);
    ctx.beginPath(); ctx.moveTo(sx, hy); ctx.lineTo(sx + fl, hy); ctx.stroke();
  }

  // Vertical posts
  const totalVert = [...vertPositions];
  if (!totalVert.some(p => p < 0.03)) totalVert.unshift(0);
  if (!totalVert.some(p => p > 0.97)) totalVert.push(1);
  totalVert.sort((a,b)=>a-b);

  totalVert.forEach(frac => {
    const vx = sx + fl * frac;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(vx, oy); ctx.lineTo(vx, oy + sh); ctx.stroke();
  });

  ctx.fillStyle = '#3498db';
  ctx.font = '11px DejaVu Sans';
  ctx.fillText(`${sideH}`, sx - 30, oy + sh/2);

  return {sx, sh, totalVert};
}

function drawTent(L, W, tentH, frameData) {
  if (tentH <= 0) return {totalArch:[]};
  const {ox, oy, fw, fl} = frameData;
  const tx = ox + fw + 50;
  const th = tentH * scale;
  const ty = oy - th - 10;

  ctx.setLineDash([6,4]);
  ctx.strokeStyle = TUBES.tent.color;
  ctx.lineWidth = 2.5;
  ctx.strokeRect(tx, ty, fl, th);
  ctx.setLineDash([]);

  // Horizontal rails
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(tx, ty + th/2); ctx.lineTo(tx + fl, ty + th/2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(tx + fl, ty); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(tx, ty + th); ctx.lineTo(tx + fl, ty + th); ctx.stroke();

  // Arches
  const totalArch = [...archPositions];
  if (!totalArch.some(p => p < 0.03)) totalArch.unshift(0);
  if (!totalArch.some(p => p > 0.97)) totalArch.push(1);
  totalArch.sort((a,b)=>a-b);

  totalArch.forEach(frac => {
    const ax = tx + fl * frac;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(ax, ty); ctx.lineTo(ax, ty + th); ctx.stroke();
  });

  ctx.fillStyle = '#27ae60';
  ctx.font = '11px DejaVu Sans';
  ctx.fillText(`${tentH}`, tx - 30, ty + th/2);

  return {tx, ty, th, totalArch};
}

function redraw() {
  const {L, W, sideH, tentH, brand} = getParams();
  canvas.width = canvas.width; // clear

  // Grid
  ctx.strokeStyle = '#f0f0f0';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < canvas.width; x += 25*scale*2) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
  }
  for (let y = 0; y < canvas.height; y += 25*scale*2) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
  }

  // Draw
  const fd = drawFrame(L, W);
  const sd = drawSides(L, W, sideH, fd);
  const td = drawTent(L, W, tentH, fd);

  // Labels
  ctx.fillStyle = '#222';
  ctx.font = 'bold 14px DejaVu Sans';
  ctx.fillText(`Прицеп ${brand} ${(L/1000).toFixed(1)}×${(W/1000).toFixed(1)} м  |  Борт ${sideH} мм  |  Тент ${tentH||'нет'}`, offsetX, 25);

  // Dimensions
  ctx.strokeStyle = '#C0392B';
  ctx.lineWidth = 0.8;
  ctx.setLineDash([4,3]);
  // W
  ctx.beginPath(); ctx.moveTo(fd.ox, fd.oy - 12); ctx.lineTo(fd.ox + fd.fw, fd.oy - 12); ctx.stroke();
  ctx.fillText(`${W}`, fd.ox + fd.fw/2 - 20, fd.oy - 16);
  // L
  ctx.beginPath(); ctx.moveTo(fd.ox - 15, fd.oy); ctx.lineTo(fd.ox - 15, fd.oy + fd.fl); ctx.stroke();
  ctx.fillText(`${L}`, fd.ox - 55, fd.oy + fd.fl/2);
  // Total
  const totL = L + fd.dbLen;
  ctx.fillText(`${totL.toFixed(0)} мм общая`, fd.apexX - 35, fd.apexY + 18);
  // Drawbar len
  ctx.fillText(`${fd.dbLen.toFixed(0)}`, fd.apexX + 12, fd.dby + (fd.apexY-fd.dby)/2);
  ctx.setLineDash([]);

  // ═══ CALC SPEC ═══
  const nCross = fd.totalCross.length;
  const nVert = sd.totalVert.length;
  const nArch = td.totalArch ? td.totalArch.length : 0;
  const nHSide = sideH >= 500 ? 2 : 1;

  const frameMain = (L*2 + W*2)/1000;
  const frameCenter = hasCenterBeam() ? L/1000 : 0;
  const frameCross = (W * nCross)/1000;

  const dbSides = Math.sqrt((W*0.9/2)*(W*0.9/2) + fd.dbLen*fd.dbLen) * 2 / 1000;
  const dbCrossBar = W * 0.9 / 1000;

  // Side boards: 4 sides (2 long + 2 short)
  // Long sides: nVert posts per side × sideH + nHSide rails × L
  const sideLongPosts = nVert * (sideH/1000) * 2;
  const sideShortPosts = (Math.floor(nVert * W/L) + 2) * (sideH/1000) * 2;
  const sideLongRails = nHSide * (L/1000) * 2;
  const sideShortRails = nHSide * (W/1000) * 2;
  const sideMeters = sideLongPosts + sideShortPosts + sideLongRails + sideShortRails;

  // Tent frame
  const tentVert = tentH > 0 ? nArch * (tentH/1000) * 2 : 0;
  const tentHoriz = tentH > 0 ? (L/1000)*3 + (W/1000)*2 : 0;
  const tentFrontBack = tentH > 0 ? (tentH/1000 + W/1000)*4 : 0;
  const tentMeters = tentVert + tentHoriz + tentFrontBack;

  const items = [
    {name:'Рама', tube:getFrameTube().name, meters: frameMain + frameCenter + frameCross, mass:0,
     desc:`${frameMain.toFixed(1)}м периметр${frameCenter>0?' + '+frameCenter.toFixed(1)+'м центр':''} + ${frameCross.toFixed(1)}м поперечин (${nCross} шт)`},
    {name:'Дышло', tube:'80×40×3', meters: dbSides + dbCrossBar, mass:0,
     desc:`${dbSides.toFixed(1)}м стороны + ${dbCrossBar.toFixed(1)}м перемычка`},
    {name:'Борта', tube:'25×25×1,5', meters: sideMeters, mass:0,
     desc:`${nVert} стоек + ${nHSide} реек ×4 стороны, ${sideH}мм`},
    {name:'Каркас тента', tube:'20×20×1,5', meters: tentMeters, mass:0,
     desc: tentH > 0 ? `${nArch} дуг × 2 стороны + ${tentHoriz.toFixed(1)}м гориз.` : 'не используется'},
  ];

  items.forEach(it => {
    const t = Object.values(TUBES).find(tb => tb.name === it.tube);
    it.mass = it.meters * (t ? t.massPerM : 0);
  });

  let totM = 0, totKg = 0;
  let html = '<table>';
  items.forEach(it => {
    if (it.meters <= 0) return;
    totM += it.meters; totKg += it.mass;
    html += `<tr><td><b>${it.name}</b></td><td>${it.tube}</td></tr>`;
    html += `<tr><td colspan="2" style="color:#888">${it.desc}</td></tr>`;
    html += `<tr><td>Метраж</td><td style="text-align:right">${it.meters.toFixed(1)} м</td></tr>`;
    html += `<tr><td>Вес</td><td style="text-align:right">${it.mass.toFixed(1)} кг</td></tr>`;
    html += `<tr><td colspan="2" style="height:3px"></td></tr>`;
  });
  html += '</table>';
  document.getElementById('spec').innerHTML = html;
  document.getElementById('total').innerHTML = `<table>
    <tr><td>Метраж</td><td style="text-align:right;font-weight:bold">${totM.toFixed(1)} м</td></tr>
    <tr><td>Вес металла</td><td style="text-align:right;font-weight:bold">${totKg.toFixed(1)} кг</td></tr>
    <tr><td>~Стоимость</td><td style="text-align:right">~${(totKg*85).toFixed(0)} ₽</td></tr>
  </table>`;

  // Update toolbar info
  const info = document.querySelector('.toolbar span:last-child');
  if (info) info.textContent = `L=${L}мм W=${W}мм | поперечин:${nCross} стоек:${nVert} дуг:${nArch} | зум:${(scale*100).toFixed(0)}%`;
}

redraw();
</script>
</body>
</html>
