<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Каталог прицепов — Самбарс</title>
<style>
* { margin:0;padding:0;box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#1a1d23; color:#e0e0e0; min-height:100vh; }
.header { background:linear-gradient(135deg,#2c3e50,#1a1d23); padding:24px 32px; border-bottom:3px solid #f39c12; position:sticky; top:0; z-index:100; }
.header h1 { font-size:28px; color:#f39c12; margin-bottom:6px; }
.header p { color:#888; font-size:14px; }

.filters { display:flex; flex-wrap:wrap; gap:12px; padding:16px 32px; background:#22252b; border-bottom:1px solid #333; align-items:center; }
.filter-group { display:flex; gap:6px; align-items:center; }
.filter-group label { font-size:13px; color:#999; white-space:nowrap; }
.filter-btn { padding:6px 14px; border:1px solid #444; border-radius:6px; background:#2a2d35; color:#aaa; cursor:pointer; font-size:13px; transition:all .2s; white-space:nowrap; }
.filter-btn:hover { border-color:#f39c12; color:#f39c12; }
.filter-btn.active { background:#f39c12; color:#1a1d23; border-color:#f39c12; font-weight:600; }
.filter-sep { width:1px; height:24px; background:#444; margin:0 8px; }

.view-toggle { display:flex; gap:4px; margin-left:auto; background:#2a2d35; border-radius:8px; padding:3px; }
.view-toggle button { padding:6px 14px; border:none; border-radius:6px; background:transparent; color:#aaa; cursor:pointer; font-size:13px; transition:all .2s; }
.view-toggle button.active { background:#f39c12; color:#1a1d23; font-weight:600; }

.container { padding:24px; max-width:1400px; margin:0 auto; }
.cards-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(400px,1fr)); gap:20px; }
.cards-grid.hidden { display:none; }

.card { background:#22252b; border-radius:12px; border:1px solid #333; overflow:hidden; transition:transform .2s,box-shadow .2s; }
.card:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(0,0,0,.4); border-color:#555; }
.card-header { padding:16px 20px; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:flex-start; }
.card-brand { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; padding:3px 10px; border-radius:4px; color:#fff; }
.card-model { font-size:18px; font-weight:700; color:#fff; margin:8px 0 4px; }
.card-specs { font-size:13px; color:#888; }
.card-specs span { margin-right:12px; }

.card-photos { padding:0; position:relative; background:#1a1d23; overflow:hidden; }
.photo-slider { display:flex; transition:transform .3s; }
.photo-slide { min-width:100%; }
.photo-slide img { width:100%; height:250px; object-fit:cover; display:block; }
.photo-nav { position:absolute; bottom:8px; left:50%; transform:translateX(-50%); display:flex; gap:6px; }
.photo-dot { width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,.4); cursor:pointer; transition:background .2s; }
.photo-dot.active { background:#f39c12; }
.photo-arrow { position:absolute; top:50%; transform:translateY(-50%); background:rgba(0,0,0,.5); color:#fff; border:none; width:32px; height:48px; cursor:pointer; font-size:18px; transition:background .2s; }
.photo-arrow:hover { background:rgba(0,0,0,.8); }
.photo-arrow.prev { left:0; border-radius:0 4px 4px 0; }
.photo-arrow.next { right:0; border-radius:4px 0 0 4px; }

.card-dims { padding:12px 20px; display:flex; align-items:center; gap:12px; border-bottom:1px solid #2a2d35; }

.card-avatars { display:flex; flex-wrap:wrap; gap:4px; margin-top:6px; }
.avatar-tag { display:inline-block; padding:2px 8px; border-radius:4px; background:rgba(243,156,18,.15); color:#f39c12; font-size:11px; font-weight:500; }
.card-extra { padding:12px 20px; border-bottom:1px solid #2a2d35; }
.card-purpose { font-size:13px; color:#ccc; line-height:1.5; margin-bottom:6px; }
.card-faq { font-size:12px; color:#888; line-height:1.4; font-style:italic; margin-bottom:4px; }

.card-specs-details { border-bottom:1px solid #2a2d35; }
.card-specs-details summary { padding:10px 20px; cursor:pointer; color:#f39c12; font-size:13px; font-weight:600; }
.card-specs-details summary:hover { color:#e67e22; }
.specs-grid { display:grid; grid-template-columns:1fr 1fr; gap:4px 16px; padding:4px 20px 12px; font-size:12px; }
.specs-grid dt { color:#888; }
.specs-grid dd { color:#ccc; margin:0; padding-bottom:4px; }
.dim-visual { position:relative; border:2px solid #f39c12; border-radius:4px; background:rgba(243,156,18,.08); display:flex; align-items:center; justify-content:center; min-width:60px; min-height:40px; }
.dim-label { font-size:11px; color:#f39c12; font-weight:600; }
.dim-info { font-size:12px; color:#777; line-height:1.6; }
.dim-info strong { color:#ccc; }

.price-matrix { padding:12px 20px 16px; }
.matrix-table { width:100%; border-collapse:collapse; font-size:13px; }
.matrix-table th { text-align:center; padding:6px 8px; color:#888; font-weight:500; font-size:11px; border-bottom:1px solid #333; }
.matrix-table td { text-align:center; padding:8px; border-bottom:1px solid #2a2d35; font-weight:600; }
.matrix-table .body-label { text-align:left; color:#aaa; font-weight:500; font-size:12px; }
.matrix-table .price-cell { color:#2ecc71; font-size:15px; font-weight:700; }
.matrix-table .price-na { color:#555; font-size:12px; }
.matrix-table tr:last-child td { border-bottom:none; }

.table-view { display:none; overflow-x:auto; }
.table-view.active { display:block; }
.data-table { width:100%; border-collapse:collapse; font-size:13px; background:#22252b; border-radius:12px; overflow:hidden; }
.data-table th { background:#2a2d35; padding:12px 14px; text-align:left; color:#f39c12; font-weight:600; font-size:12px; white-space:nowrap; position:sticky; top:108px; z-index:5; }
.data-table td { padding:10px 14px; border-bottom:1px solid #2a2d35; white-space:nowrap; }
.data-table tr:hover td { background:rgba(243,156,18,.04); }
.data-table .price { color:#2ecc71; font-weight:700; }
.brand-tag { display:inline-block; padding:2px 8px; border-radius:3px; font-size:11px; font-weight:700; color:#fff; }

.axle-badge { display:inline-block; font-size:11px; padding:2px 6px; border-radius:3px; background:#2a2d35; color:#f39c12; margin-top:4px; }
.card-price-summary { text-align:right; }
.price-from { font-size:11px; color:#777; }
.price-min { font-size:20px; font-weight:700; color:#2ecc71; }
.price-max { font-size:11px; color:#555; }

.counter { font-size:13px; color:#666; padding:0 0 16px; }

@keyframes fadeIn { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }
.card { animation:fadeIn .3s ease; }

@media (max-width:768px) {
  .cards-grid { grid-template-columns:1fr; }
  .filters { padding:12px 16px; }
  .header { padding:16px; }
  .container { padding:12px; }
  .photo-slide img { height:200px; }
}
</style>
</head>

    <button id="view-table">📊 Таблица</button>

</div>

<div class="container">

const BODY_ORDER = ["\u0440\u0430\u043c\u0430", "\u0440\u0430\u043c\u0430 \u0441 \u043f\u043e\u043b\u043e\u043c", "\u0431\u043e\u0440\u0442\u043e\u0432\u043e\u0439", "\u0431\u043e\u0440\u0442\u043e\u0432\u043e\u0439 \u0441 \u0442\u0435\u043d\u0442\u043e\u043c"];
const BODY_LABELS = {"\u0440\u0430\u043c\u0430": "\u0420\u0430\u043c\u0430", "\u0440\u0430\u043c\u0430 \u0441 \u043f\u043e\u043b\u043e\u043c": "\u0420\u0430\u043c\u0430 \u0441 \u043f\u043e\u043b\u043e\u043c", "\u0431\u043e\u0440\u0442\u043e\u0432\u043e\u0439": "\u0411\u043e\u0440\u0442\u043e\u0432\u043e\u0439", "\u0431\u043e\u0440\u0442\u043e\u0432\u043e\u0439 \u0441 \u0442\u0435\u043d\u0442\u043e\u043c": "\u0411\u043e\u0440\u0442 + \u0442\u0435\u043d\u0442"};
const BODY_ICONS = {"\u0440\u0430\u043c\u0430": "\ud83d\udd29", "\u0440\u0430\u043c\u0430 \u0441 \u043f\u043e\u043b\u043e\u043c": "\ud83e\udeb5", "\u0431\u043e\u0440\u0442\u043e\u0432\u043e\u0439": "\ud83d\udce6", "\u0431\u043e\u0440\u0442\u043e\u0432\u043e\u0439 \u0441 \u0442\u0435\u043d\u0442\u043e\u043c": "\ud83c\udfd5\ufe0f"};
const BRAND_COLORS = {"\u0411\u0430\u0440\u0441\u0443\u043a": "#f39c12", "\u0421\u0430\u043c\u0431\u0430\u0440\u0441": "#e74c3c", "\u0411\u0438\u0437\u043e\u043d": "#2ecc71"};

let filters = { brand:'all', axle:'all', width:'all', avatar:'all' };
let viewMode = 'cards';

function fmtPrice(n) { return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,' '); }

function getPrice(model, bodyType, axles) {
  const v = model.variants.find(v => v.body_type === bodyType && v.axles === axles);
  return v ? v.price : null;
}

function matchesFilters(model) {
  if (filters.brand !== 'all' && model.brand !== filters.brand) return false;
  if (filters.axle !== 'all') {
    if (filters.axle === 'both') { if (model.axle_options.length < 2) return false; }
    else { if (!model.axle_options.includes(parseInt(filters.axle))) return false; }
  }
  if (filters.width !== 'all' && model.width !== parseFloat(filters.width)) return false;
  if (filters.avatar !== 'all' && !model.avatars.includes(filters.avatar)) return false;
  return true;
}

function renderCard(model, idx) {
  const color = BRAND_COLORS[model.brand] || '#888';
  const dimsW = model.width || 1;
  const dimsL = model.length || 2;
  const maxDim = Math.max(dimsW, dimsL);
  const scale = 80 / maxDim;
  const visualW = Math.max(50, dimsW * scale);
  const visualH = Math.max(30, dimsL * scale);
  
  let prices = model.variants.map(v => v.price);
  let minPrice = Math.min(...prices);
  let maxPrice = Math.max(...prices);
  
  let photosHtml = '';
  if (model.photos && model.photos.length > 0) {
    const uid = 'p' + idx;
    if (model.photos.length === 1) {
      photosHtml = '<div class="card-photos"><div class="photo-slide"><img src="'+model.photos[0]+'" alt="Фото '+model.brand+'" loading="lazy"></div></div>';
    } else {
      let slides = model.photos.map((p,i) => '<div class="photo-slide" id="'+uid+'_'+i+'"><img src="'+p+'" alt="Фото '+model.brand+' #'+(i+1)+'" loading="lazy"></div>').join('');
      let dots = model.photos.map((_,i) => '<span class="photo-dot'+(i===0?' active':'')+'" onclick="goSlide(\''+uid+'\','+i+')"></span>').join('');
      photosHtml = '<div class="card-photos" id="'+uid+'"><div class="photo-slider" id="'+uid+'_slider">'+slides+'</div><button class="photo-arrow prev" onclick="prevSlide(\''+uid+'\')">‹</button><button class="photo-arrow next" onclick="nextSlide(\''+uid+'\')">›</button><div class="photo-nav">'+dots+'</div></div>';
    }
  }
  
  let matrixRows = '';
  for (const bt of BODY_ORDER) {
    const p1 = getPrice(model, bt, 1);
    const p2 = getPrice(model, bt, 2);
    if (p1 === null && p2 === null) continue;
    const has1 = model.axle_options.includes(1);
    const has2 = model.axle_options.includes(2);
    const cell1 = p1 !== null ? '<span class="price-cell">'+fmtPrice(p1)+' ₽</span>' : '<span class="price-na">—</span>';
    const cell2 = p2 !== null ? '<span class="price-cell">'+fmtPrice(p2)+' ₽</span>' : '<span class="price-na">—</span>';
    matrixRows += '<tr><td class="body-label">'+(BODY_ICONS[bt]||'')+' '+(BODY_LABELS[bt]||bt)+'</td><td>'+(has1?cell1:'<span class="price-na">—</span>')+'</td><td>'+(has2?cell2:'<span class="price-na">—</span>')+'</td></tr>';
  }
  
  const axleStr = model.axle_options.length === 2 ? 'одноосный / двухосный' : (model.axle_options[0] === 1 ? 'одноосный' : 'двухосный');
  const tentInfo = model.tent_height ? '<span>⛺ Тент: '+model.tent_height+' см</span>' : '';
  const colorInfo = model.tent_color ? '<span>🎨 '+model.tent_color+(model.extra_colors?' (+'+model.extra_colors+')':'')+'</span>' : '';
  const dushlo = model.brand === 'Бизон' ? 'вварное 4-лучевое' : 'съёмное самосвальное';
  const tentDisp = model.tent_height ? '<div>⛺ Высота тента: <strong>'+model.tent_height+' см</strong></div>' : '';
  
  // Аватар-теги
  const avatarIcons = {'Дачник':'🏡','Мототехника':'🏍','Стройбригада':'🏗','Бизнес':'🚛','Загородный дом':'🏠','Пчеловодство':'🐝'};
  let avatarTags = model.avatars.map(a => '<span class="avatar-tag">'+(avatarIcons[a]||'')+' '+a+'</span>').join(' ');
  
  // FAQ и предназначение
  let purposeHtml = model.purpose ? '<div class="card-purpose">🎯 '+model.purpose+'</div>' : '';
  let faqHtml = model.faq ? '<div class="card-faq">💬 <strong>FAQ:</strong> '+model.faq+'</div>' : '';
  let extraInfo = (purposeHtml || faqHtml) ? '<div class="card-extra">'+purposeHtml+faqHtml+'</div>' : '';
  
  return '<div class="card"><div class="card-header"><div><span class="card-brand" style="background:'+color+'">'+model.brand+'</span><div class="card-model">'+model.model+'</div><div class="card-specs">'+tentInfo+colorInfo+'</div><div class="card-avatars">'+avatarTags+'</div></div><div class="card-price-summary"><div class="price-from">от</div><div class="price-min">'+fmtPrice(minPrice)+' ₽</div><div class="price-max">до '+fmtPrice(maxPrice)+' ₽</div><div class="axle-badge">'+axleStr+'</div></div></div>'+photosHtml+extraInfo+(model.specs ? '<div class="card-specs-details"><details><summary>📋 Характеристики</summary><dl class="specs-grid">'+Object.entries(model.specs).map(([k,v]) => '<dt>'+k+'</dt><dd>'+v+'</dd>').join('')+'</dl></details></div>' : '')+'<div class="card-dims"><div class="dim-visual" style="width:'+visualW+'px;height:'+visualH+'px"><span class="dim-label">'+model.width+'×'+model.length+'</span></div><div class="dim-info"><div>📐 Габариты: <strong>'+model.width+' × '+model.length+' м</strong></div>'+tentDisp+'<div>🔧 Дышло: <strong>'+dushlo+'</strong></div></div></div><div class="price-matrix"><table class="matrix-table"><thead><tr><th style="text-align:left">Комплектация</th><th>1 ось</th><th>2 оси</th></tr></thead><tbody>'+matrixRows+'</tbody></table></div></div>';
}

function goSlide(uid, n) {
  const slider = document.getElementById(uid+'_slider');
  if (slider) slider.style.transform = 'translateX(-'+ (n*100) +'%)';
  const dots = document.querySelectorAll('#'+uid+' .photo-dot');
  dots.forEach((d,i) => d.classList.toggle('active', i===n));
}
function nextSlide(uid) {
  const slider = document.getElementById(uid+'_slider');
  const count = slider.children.length;
  const cur = Math.round(Math.abs(parseFloat(slider.style.transform.replace('translateX(','').replace('%)','')) || 0) / 100);
  goSlide(uid, (cur+1)%count);
}
function prevSlide(uid) {
  const slider = document.getElementById(uid+'_slider');
  const count = slider.children.length;
  const cur = Math.round(Math.abs(parseFloat(slider.style.transform.replace('translateX(','').replace('%)','')) || 0) / 100);
  goSlide(uid, (cur-1+count)%count);
}

function renderTable() {
  const filtered = MODELS.filter(matchesFilters);
  let rows = '';
  for (const m of filtered) {
    const color = BRAND_COLORS[m.brand] || '#888';
    const axleStr = m.axle_options.length===2?'1+2 оси':(m.axle_options[0]===1?'1 ось':'2 оси');
    const tent = m.tent_height ? m.tent_height+' см' : '—';
    const avatarShort = m.avatars ? m.avatars.slice(0,2).join(', ') : '—';
    const purposeShort = m.purpose ? m.purpose.substring(0,50)+(m.purpose.length>50?'…':'') : '—';
    rows += '<tr><td><span class="brand-tag" style="background:'+color+'">'+m.brand+'</span></td><td><strong>'+m.model+'</strong></td><td>'+m.width+'×'+m.length+' м</td><td>'+tent+'</td><td>'+axleStr+'</td><td style="max-width:140px;overflow:hidden;text-overflow:ellipsis" title="'+purposeShort.replace(/"/g,'&quot;')+'">'+avatarShort+'</td><td style="max-width:200px;overflow:hidden;text-overflow:ellipsis" title="'+purposeShort.replace(/"/g,'&quot;')+'">'+purposeShort+'</td>';
    for (const bt of BODY_ORDER) {
      const p1 = getPrice(m, bt, 1);
      const p2 = getPrice(m, bt, 2);
      rows += '<td'+(m.axle_options.includes(1)&&p1?' class="price"':'')+'>'+(m.axle_options.includes(1)&&p1?fmtPrice(p1)+' ₽':(m.axle_options.includes(1)?'—':'<span style="color:#444">—</span>'))+'</td>';
      rows += '<td'+(m.axle_options.includes(2)&&p2?' class="price"':'')+'>'+(m.axle_options.includes(2)&&p2?fmtPrice(p2)+' ₽':(m.axle_options.includes(2)?'—':'<span style="color:#444">—</span>'))+'</td>';
    }
    rows += '</tr>';
  }
  return '<table class="data-table"><thead><tr><th>Бренд</th><th>Модель</th><th>Габариты</th><th>Тент</th><th>Оси</th><th>Кому</th><th>Назначение</th><th>Рама 1 ось</th><th>Рама 2 оси</th><th>Рама+пол 1 ось</th><th>Рама+пол 2 оси</th><th>Борт 1 ось</th><th>Борт 2 оси</th><th>Борт+тент 1 ось</th><th>Борт+тент 2 оси</th></tr></thead><tbody>'+rows+'</tbody></table>';
}

function refresh() {
  const filtered = MODELS.filter(matchesFilters);
  document.getElementById('counter').textContent = 'Показано: '+filtered.length+' моделей';
  if (viewMode === 'cards') {
    document.getElementById('cardsGrid').innerHTML = filtered.map((m,i) => renderCard(m,i)).join('');
  } else {
    document.getElementById('tableView').innerHTML = renderTable();
  }
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    const ft = this.dataset.filter;
    this.parentElement.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    filters[ft] = this.dataset.val;
    refresh();
  });
});

document.getElementById('view-cards').addEventListener('click', function() {
  viewMode = 'cards';
  this.classList.add('active');
  document.getElementById('view-table').classList.remove('active');
  document.getElementById('cardsGrid').classList.remove('hidden');
  document.getElementById('tableView').classList.remove('active');
  refresh();
});

document.getElementById('view-table').addEventListener('click', function() {
  viewMode = 'table';
  this.classList.add('active');
  document.getElementById('view-cards').classList.remove('active');
  document.getElementById('cardsGrid').classList.add('hidden');
  document.getElementById('tableView').classList.add('active');
  refresh();
});

refresh();
</script>
</body>
